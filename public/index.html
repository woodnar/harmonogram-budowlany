<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonogramy budowlane</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg1:#ffffff;--bg2:#f5f5f3;--bg3:#eeece7;
  --bg-info:#e6f1fb;--bg-danger:#fcebeb;--bg-success:#eaf3de;--bg-warning:#faeeda;
  --tx1:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;
  --tx-info:#185fa5;--tx-danger:#a32d2d;--tx-success:#3b6d11;--tx-warning:#854f0b;
  --bd3:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);--bd1:rgba(0,0,0,.32);
  --bd-info:#378add;--r-md:8px;--r-lg:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg1:#1e1e1c;--bg2:#2a2a28;--bg3:#333330;
  --bg-info:#0c3558;--bg-danger:#3d1515;--bg-success:#1a3308;--bg-warning:#3d2504;
  --tx1:#f0ede6;--tx2:#b4b2a9;--tx3:#888780;
  --tx-info:#85b7eb;--tx-danger:#f09595;--tx-success:#97c459;--tx-warning:#ef9f27;
  --bd3:rgba(255,255,255,.10);--bd2:rgba(255,255,255,.20);--bd1:rgba(255,255,255,.32);
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg3);color:var(--tx1);min-height:100vh}
/* login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-box{background:var(--bg1);border:0.5px solid var(--bd3);border-radius:var(--r-lg);padding:2rem;width:100%;max-width:360px}
.login-title{font-size:18px;font-weight:500;margin-bottom:6px;color:var(--tx1)}
.login-sub{font-size:13px;color:var(--tx2);margin-bottom:1.5rem}
/* shell */
.shell{max-width:1140px;margin:0 auto;padding:1.5rem 1rem}
/* nav */
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem}
.app-title{font-size:15px;font-weight:500;color:var(--tx1)}
.tab-bar{display:flex;gap:3px;background:var(--bg2);border-radius:var(--r-md);padding:3px;flex-wrap:wrap}
.tab{font-size:13px;padding:5px 12px;border-radius:6px;border:none;background:transparent;color:var(--tx2);cursor:pointer;white-space:nowrap}
.tab.active{background:var(--bg1);color:var(--tx1);font-weight:500;border:0.5px solid var(--bd3)}
/* buttons */
.btn{font-size:13px;padding:6px 13px;border-radius:var(--r-md);border:0.5px solid var(--bd2);background:var(--bg1);color:var(--tx1);cursor:pointer}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--bg-info);color:var(--tx-info);border-color:transparent}
.btn-primary:hover{opacity:.85}
.btn-sm{font-size:12px;padding:4px 10px}
/* cards */
.card{background:var(--bg1);border:0.5px solid var(--bd3);border-radius:var(--r-lg);padding:15px 16px;margin-bottom:10px}
.card.sel{border:1.5px solid var(--bd-info)}
.card-hover:hover{border-color:var(--bd2);cursor:pointer}
/* stats */
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:var(--bg2);border-radius:var(--r-md);padding:12px 14px}
.sl{font-size:12px;color:var(--tx2);margin-bottom:3px}
.sv{font-size:22px;font-weight:500;color:var(--tx1)}
.ss{font-size:11px;color:var(--tx3);margin-top:2px}
.slbl{font-size:12px;font-weight:500;color:var(--tx2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:9px}
/* badges */
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.g-green{background:#EAF3DE;color:#3B6D11}.g-blue{background:#E6F1FB;color:#185FA5}
.g-gray{background:#F1EFE8;color:#5F5E5A}.g-red{background:#FCEBEB;color:#A32D2D}
.g-amber{background:#FAEEDA;color:#854F0B}.g-teal{background:#E1F5EE;color:#0F6E56}
.g-purple{background:#EEEDFE;color:#534AB7}.g-coral{background:#FAECE7;color:#993C1D}
@media(prefers-color-scheme:dark){
  .g-green{background:#1a3308;color:#97c459}.g-blue{background:#0c3558;color:#85b7eb}
  .g-gray{background:#2a2a28;color:#b4b2a9}.g-red{background:#3d1515;color:#f09595}
  .g-amber{background:#3d2504;color:#ef9f27}.g-teal{background:#04342c;color:#5dcaa5}
  .g-purple{background:#26215c;color:#afa9ec}.g-coral{background:#4a1b0c;color:#f0997b}
}
/* progress */
.pbar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px}
/* avatar */
.ava{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
/* chip */
.chip{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg2);color:var(--tx2);border:0.5px solid var(--bd3)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
/* gantt */
.gantt-wrap{overflow-x:auto;margin-top:10px}
.gtbl{min-width:580px;width:100%;border-collapse:collapse}
.gtbl th{font-size:11px;color:var(--tx2);font-weight:500;text-align:left;padding:4px 5px 7px;border-bottom:0.5px solid var(--bd3)}
.gtbl td{padding:4px 5px;vertical-align:middle;border-bottom:0.5px solid var(--bd3)}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:center;padding-top:60px;z-index:100}
.modal{background:var(--bg1);border:0.5px solid var(--bd2);border-radius:var(--r-lg);padding:20px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.mtitle{font-size:15px;font-weight:500;margin-bottom:13px;color:var(--tx1)}
.frow{margin-bottom:11px}
.frow label{display:block;font-size:12px;color:var(--tx2);margin-bottom:4px}
.frow input,.frow select,.frow textarea{width:100%;font-size:13px;padding:7px 10px;border:0.5px solid var(--bd2);border-radius:var(--r-md);background:var(--bg2);color:var(--tx1)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
/* split */
.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.6fr);gap:14px}
/* actions */
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px;padding-top:13px;border-top:0.5px solid var(--bd3)}
/* alert */
.alert-danger{background:var(--bg-danger);border:0.5px solid rgba(163,45,45,.25);border-radius:var(--r-md);padding:10px 14px;margin-bottom:14px}
/* timeline */
.tl-wrap{overflow-x:auto}
.tl-inner{min-width:660px}
.wh-row{display:flex;align-items:center;margin-bottom:5px}
.row-lbl{flex-shrink:0;padding-right:10px}
.row-cells{display:flex;flex:1}
.wc{flex:1;min-width:19px;text-align:center;font-size:10px;color:var(--tx3)}
.wc.hi{color:#BA7517;font-weight:500}.wc.ov{color:#E24B4A;font-weight:500}
.bar-row{display:flex;align-items:center;margin-bottom:5px}
.bar-cells{display:flex;flex:1;height:26px}
.bc{flex:1;min-width:19px;position:relative}
.bfill{position:absolute;inset:3px 1px;border-radius:3px;cursor:pointer}
.bfill:hover{opacity:.65!important}
.cmark{position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#E24B4A;z-index:2}
.tip{position:absolute;background:var(--bg1);border:0.5px solid var(--bd2);border-radius:8px;padding:7px 11px;font-size:12px;color:var(--tx1);z-index:30;pointer-events:none;white-space:nowrap;bottom:110%;left:50%;transform:translateX(-50%);min-width:160px;line-height:1.5}
.div-row{display:flex;align-items:center;margin:8px 0 4px}
.div-cells{display:flex;flex:1;height:18px}
.div-c{flex:1;min-width:19px;position:relative}
.div-fill{position:absolute;inset:2px 1px;border-radius:2px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:13px;font-size:11px;color:var(--tx2)}
.lsq{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.fbtn{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--bd2);background:var(--bg1);color:var(--tx2);cursor:pointer}
.fbtn.active{background:var(--bg-info);color:var(--tx-info);border-color:transparent;font-weight:500}
/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--tx1);color:var(--bg1);font-size:13px;padding:10px 18px;border-radius:var(--r-md);z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
/* loading */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--tx2);font-size:14px}
@media(max-width:640px){
  .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
  .split{grid-template-columns:1fr}
  .tab{padding:4px 8px;font-size:12px}
}
</style>
</head>
<body>

<div id="root"></div>
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════
   CONSTANTS
══════════════════════════════ */
const PROJ_HEX = ['#378ADD','#1D9E75','#D85A30','#7F77DD','#BA7517'];
const STAT_HEX = {done:'#639922',inprogress:'#378ADD',planned:'#B4B2A9',delayed:'#E24B4A',notstarted:'#D3D1C7'};
const STAT_LBL = {done:'Zakończony',inprogress:'W trakcie',planned:'Planowany',delayed:'Opóźniony',notstarted:'Nie rozpoczęty'};
const STAT_CLS = {done:'g-green',inprogress:'g-blue',planned:'g-gray',delayed:'g-red',notstarted:'g-gray'};
const AVA_CLS  = ['g-blue','g-teal','g-purple','g-coral','g-amber','g-green'];
const SPEC_MAP = {'roboty ziemne':'g-amber','fundamenty':'g-coral','murowanie':'g-coral','beton':'g-coral','dach':'g-teal','konstrukcja stalowa':'g-teal','instalacje elektryczne':'g-blue','instalacje wod-kan':'g-blue','instalacje':'g-blue','tynki':'g-gray','elewacja':'g-purple','wykończenie':'g-purple','stolarka':'g-green','zieleń':'g-green','nadzór':'g-gray','projekt':'g-purple'};
function specCls(s){for(const k in SPEC_MAP)if(s.toLowerCase().includes(k))return SPEC_MAP[k];return'g-gray';}

/* ══════════════════════════════
   STATE
══════════════════════════════ */
let state = {
  authenticated: false,
  loading: false,
  view: 'projects',
  projects: [],
  subs: [],
  selProjId: null,
  selSubId: null,
  modal: null,
  subFilter: 'all',
  subSearch: '',
  dashSubFilter: 'all',
  saving: false,
};
let chartProjInst = null;
let chartSubInst  = null;
let tipEl = null;

/* ══════════════════════════════
   API
══════════════════════════════ */
async function api(method, url, body) {
  try {
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (res.status === 401) { state.authenticated = false; render(); return null; }
    return await res.json();
  } catch (e) {
    toast('Błąd połączenia z serwerem');
    return null;
  }
}

async function loadData() {
  const [projects, subs] = await Promise.all([
    api('GET', '/api/projects'),
    api('GET', '/api/subcontractors'),
  ]);
  if (projects) state.projects = projects;
  if (subs) state.subs = subs;
  if (state.projects.length && !state.selProjId) state.selProjId = state.projects[0].id;
  state.loading = false;
  render();
}

/* ══════════════════════════════
   HELPERS
══════════════════════════════ */
const getProj  = id => state.projects.find(p => p.id === id);
const getSub   = id => state.subs.find(s => s.id === id);
const ini      = n  => n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
const avaCls   = id => AVA_CLS[id % AVA_CLS.length];
const val      = id => { const e=document.getElementById(id); return e?e.value.trim():''; };
const badge    = s  => `<span class="badge ${STAT_CLS[s]}">${STAT_LBL[s]}</span>`;
const MAX_WEEK = () => Math.max(...state.projects.map(p=>p.weeks), 1);
const weeks    = () => Array.from({length:MAX_WEEK()},(_,i)=>i+1);

function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function subUsage(subId) {
  const res = [];
  state.projects.forEach(p => p.stages.filter(s=>s.subId===subId).forEach(s => res.push({proj:p.name,stage:s.name,status:s.status})));
  return res;
}

function detectConflicts() {
  const cs = [];
  state.subs.forEach(sub => {
    const byWeek = {};
    state.projects.forEach((p,pi) => p.stages.filter(s=>s.subId===sub.id).forEach(s => {
      for(let w=s.start;w<s.start+s.dur;w++){if(!byWeek[w])byWeek[w]=[];byWeek[w].push({proj:p,pi});}
    }));
    Object.entries(byWeek).forEach(([w,entries]) => {
      const uP=[...new Set(entries.map(e=>e.proj.id))];
      if(uP.length>1) cs.push({sub:sub.name,week:+w,projs:uP.map(id=>state.projects.find(p=>p.id===id).short||state.projects.find(p=>p.id===id).name).join(' + ')});
    });
  });
  return cs;
}

function getWeekSubLoad(w) {
  const ids = new Set();
  state.projects.forEach(p => p.stages.filter(s=>w>=s.start&&w<s.start+s.dur).forEach(s=>{if(s.subId)ids.add(s.subId);}));
  return ids.size;
}
function getProjOverlap(w) {
  return state.projects.filter(p=>p.stages.some(s=>w>=s.start&&w<s.start+s.dur)).length;
}

function showTip(el, html) {
  if(tipEl) tipEl.remove();
  tipEl = document.createElement('div'); tipEl.className='tip'; tipEl.innerHTML=html;
  el.parentElement.appendChild(tipEl);
}
function hideTip(){if(tipEl){tipEl.remove();tipEl=null;}}

/* ══════════════════════════════
   RENDER: LOGIN
══════════════════════════════ */
function renderLogin() {
  return `<div class="login-wrap">
    <div class="login-box">
      <div class="login-title">Harmonogramy budowlane</div>
      <div class="login-sub">Zaloguj się hasłem zespołu aby kontynuować.</div>
      <div class="frow"><label>Hasło zespołu</label><input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div id="login-err" style="font-size:12px;color:var(--tx-danger);margin-bottom:10px;display:none">Nieprawidłowe hasło.</div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Zaloguj się</button>
    </div>
  </div>`;
}

async function doLogin() {
  const pw = val('pw');
  const r = await api('POST', '/api/login', { password: pw });
  if (r && r.ok) {
    state.authenticated = true;
    state.loading = true;
    render();
    await loadData();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

async function doLogout() {
  await api('POST', '/api/logout');
  state.authenticated = false;
  state.projects = []; state.subs = [];
  render();
}

/* ══════════════════════════════
   RENDER: TOPBAR
══════════════════════════════ */
function renderTopbar() {
  const tabs = [
    {id:'projects',lbl:'Projekty'},{id:'gantt',lbl:'Harmonogram'},
    {id:'subs',lbl:'Podwykonawcy'},{id:'dash-proj',lbl:'Dashboard projektów'},
    {id:'dash-sub',lbl:'Dashboard podwykonawców'},
  ];
  return `<div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span class="app-title">Harmonogramy budowlane</span>
      <div class="tab-bar">${tabs.map(t=>`<button class="tab ${state.view===t.id?'active':''}" onclick="setView('${t.id}')">${t.lbl}</button>`).join('')}</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-primary" onclick="openModal(state.view==='subs'?'addsub':'newproj')">+ ${state.view==='subs'?'Nowy podwykonawca':'Nowy projekt'}</button>
      <button class="btn btn-sm" onclick="doLogout()">Wyloguj</button>
    </div>
  </div>`;
}

/* ══════════════════════════════
   RENDER: PROJECTS
══════════════════════════════ */
function renderProjects() {
  const del = state.projects.reduce((a,p)=>a+p.stages.filter(s=>s.status==='delayed').length,0);
  const avg = state.projects.length ? Math.round(state.projects.reduce((a,p)=>a+calcProgress(p),0)/state.projects.length) : 0;
  const actS = state.subs.filter(s=>s.active).length;
  const rows = state.projects.map(p => {
    const isDel = p.stages.some(s=>s.status==='delayed');
    const prog = calcProgress(p);
    const col = isDel?'#E24B4A':prog>=80?'#639922':'#378ADD';
    const st = isDel?'delayed':prog===100?'done':prog>0?'inprogress':'notstarted';
    return `<div class="card card-hover ${p.id===state.selProjId?'sel':''}" onclick="selectProj(${p.id})">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:14px;font-weight:500;color:var(--tx1)">${p.name}</span>${badge(st)}
      </div>
      <div style="font-size:12px;color:var(--tx2);margin-bottom:8px">${p.location} · ${p.client} · ${p.weeks} tyg. · ${p.stages.length} etapów</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="pbar" style="flex:1"><div class="pfill" style="width:${prog}%;background:${col}"></div></div>
        <span style="font-size:12px;color:var(--tx2);min-width:30px;text-align:right">${prog}%</span>
      </div>
    </div>`;
  }).join('');
  return `<div class="stats">
    <div class="stat"><div class="sl">Projekty</div><div class="sv">${state.projects.length}</div></div>
    <div class="stat"><div class="sl">Postęp średni</div><div class="sv">${avg}%</div></div>
    <div class="stat"><div class="sl">Opóźnienia</div><div class="sv" style="color:${del?'#E24B4A':'inherit'}">${del}</div><div class="ss">etapów</div></div>
    <div class="stat"><div class="sl">Podwykonawcy</div><div class="sv">${actS}</div><div class="ss">aktywnych</div></div>
  </div><div class="slbl">Projekty</div>${rows}`;
}

/* ══════════════════════════════
   RENDER: GANTT
══════════════════════════════ */
function renderGantt() {
  const p = getProj(state.selProjId); if(!p) return '<div class="loading">Wybierz projekt</div>';
  const ws = Array.from({length:p.weeks},(_,i)=>i+1);
  const wCols = ws.map(w=>`<th style="min-width:26px;width:26px;text-align:center;font-size:10px">T${w}</th>`).join('');
  const STATUS_NEXT = {
    notstarted:{next:'planned',lbl:'→ Planowany'},
    planned:{next:'inprogress',lbl:'→ Rozpocznij'},
    inprogress:{next:'done',lbl:'→ Zakończ'},
    done:{next:'notstarted',lbl:'↺ Cofnij'},
    delayed:{next:'inprogress',lbl:'→ Wznów'},
  };
  const rows = p.stages.map(s => {
    const sub = getSub(s.subId);
    const col = STAT_HEX[s.status];
    const cells = ws.map(w => {
      if(w<s.start||w>=s.start+s.dur)return'<td></td>';
      const r1=w===s.start?'3px':'0';const r2=w===s.start+s.dur-1?'3px':'0';
      return`<td style="padding:3px 1px"><div style="height:13px;background:${col};opacity:${s.status==='done'?1:s.status==='inprogress'?.75:.35};border-radius:${r1} ${r2} ${r2} ${r1}"></div></td>`;
    }).join('');
    const sn = sub
      ? `<span style="font-size:11px;color:var(--tx2);cursor:pointer;text-decoration:underline dotted" onclick="goSub(${sub.id})">${sub.name}</span>`
      : `<span style="font-size:11px;color:var(--tx3)">— brak —</span>`;
    const nx = STATUS_NEXT[s.status];
    const statusBtn = `<button onclick="quickStatus(${s.id},'${nx.next}')" style="font-size:11px;padding:2px 8px;border-radius:6px;border:0.5px solid var(--bd2);background:var(--bg2);color:var(--tx2);cursor:pointer;white-space:nowrap">${nx.lbl}</button>`;
    const editBtn = `<button onclick="openModal('editstage',null,${s.id})" style="font-size:11px;padding:2px 8px;border-radius:6px;border:0.5px solid var(--bd2);background:var(--bg2);color:var(--tx2);cursor:pointer">Edytuj</button>`;
    const delBtn = `<button onclick="deleteStage(${s.id})" style="font-size:11px;padding:2px 6px;border-radius:6px;border:0.5px solid var(--bd2);background:var(--bg2);color:var(--tx-danger);cursor:pointer">✕</button>`;
    return`<tr>
      <td style="font-size:13px;color:var(--tx1);min-width:140px;max-width:160px">${s.name}<br>${sn}</td>
      <td style="padding:4px 5px;white-space:nowrap">${badge(s.status)}</td>

    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:13px;flex-wrap:wrap;gap:8px">
      <div><div style="font-size:15px;font-weight:500;color:var(--tx1)">${p.name}</div>
      <div style="font-size:12px;color:var(--tx2);margin-top:3px">${p.location} · ${p.client}</div></div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        ${badge(isDel?'delayed':'inprogress')}

    <div class="stats" style="margin-bottom:13px">
      <div class="stat"><div class="sl">Postęp</div><div class="sv">${calcProgress(p)}%</div></div>
      <div class="stat"><div class="sl">Etapów</div><div class="sv">${p.stages.length}</div></div>
      <div class="stat"><div class="sl">Zakończone</div><div class="sv">${done}</div></div>
      <div class="stat"><div class="sl">Tygodnie</div><div class="sv">${p.weeks}</div></div>
    </div>
    <div class="slbl">Harmonogram Gantta</div>
    <div style="font-size:11px;color:var(--tx3);margin-bottom:8px">Kliknij strzałkę aby zmienić status etapu. Kliknij "Edytuj" aby zmienić podwykonawcę lub terminy.</div>

      <tbody>${rows}</tbody>
    </table></div>
    <div class="actions"><button class="btn" onclick="openModal('addstage')">+ Dodaj etap</button></div>
  </div>`;
}

            ${u.length?`<span class="badge g-blue">${u.length} etap${u.length>1?'ów':''}</span>`:''}

/* ══════════════════════════════
   RENDER: DASHBOARD PROJEKTY
══════════════════════════════ */
function renderDashProj() {
  const W = weeks();
  const del = state.projects.reduce((a,p)=>a+p.stages.filter(s=>s.status==='delayed').length,0);
  const avg = state.projects.length ? Math.round(state.projects.reduce((a,p)=>a+calcProgress(p),0)/state.projects.length) : 0;
  const wHead = W.map(w=>{const n=getProjOverlap(w);return`<div class="wc ${n>=3?'ov':n>=2?'hi':''}">T${w}</div>`;}).join('');
  const projRows = state.projects.map((p,pi)=>{
    const col = PROJ_HEX[pi%PROJ_HEX.length];
    const cells = W.map(w=>{
      const act = p.stages.filter(s=>w>=s.start&&w<s.start+s.dur);
      if(!act.length)return`<div class="bc"></div>`;
      const isDel=act.some(s=>s.status==='delayed');
      const c=isDel?'#E24B4A':col;const op=act[0].status==='done'?1:act[0].status==='inprogress'?.8:.4;
      return`<div class="bc"><div class="bfill" style="background:${c};opacity:${op}" onmouseenter="showTip(this,'T${w}: ${act.map(s=>s.name).join(', ')}')" onmouseleave="hideTip()"></div></div>`;
    }).join('');
    return`<div class="bar-row"><div class="row-lbl" style="width:160px"><div style="font-size:13px;font-weight:500;color:var(--tx1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:155px">${p.name}</div><div style="font-size:10px;color:var(--tx2)">${calcProgress(p)}% · ${p.weeks} tyg.</div></div><div class="bar-cells">${cells}</div></div>`;
  }).join('');
  const overRow = W.map(w=>{const n=getProjOverlap(w);if(!n)return`<div class="div-c"></div>`;const c=n>=3?'#E24B4A':n===2?'#BA7517':'#378ADD';const op=n===1?.25:n===2?.55:.85;return`<div class="div-c"><div class="div-fill" style="background:${c};opacity:${op}"></div></div>`;}).join('');
  return `<div class="stats">
    <div class="stat"><div class="sl">Projekty</div><div class="sv">${state.projects.length}</div></div>
    <div class="stat"><div class="sl">Postęp średni</div><div class="sv">${avg}%</div></div>
    <div class="stat"><div class="sl">Opóźnienia</div><div class="sv" style="color:${del?'#E24B4A':'inherit'}">${del}</div></div>
    <div class="stat"><div class="sl">Etapów łącznie</div><div class="sv">${state.projects.reduce((a,p)=>a+p.stages.length,0)}</div></div>
  </div>
  <div class="card" style="margin-bottom:1.25rem">
    <div class="slbl">Wszystkie projekty — oś tygodni</div>
    <div class="legend">${state.projects.map((p,i)=>`<span><span class="lsq" style="background:${PROJ_HEX[i]}"></span>${p.short||p.name}</span>`).join('')}<span><span class="lsq" style="background:#E24B4A"></span>opóźniony</span></div>
    <div class="tl-wrap"><div class="tl-inner">
      <div class="wh-row"><div class="row-lbl" style="width:160px"></div><div class="row-cells">${wHead}</div></div>
      ${projRows}
      <div class="div-row" style="margin-top:10px"><div class="row-lbl" style="width:160px;font-size:11px;font-weight:500;color:var(--tx2)">Nakładanie projektów</div><div class="div-cells">${overRow}</div></div>
    </div></div>
  </div>
  <div class="card">
    <div class="slbl">Obciążenie tygodniowe — etapów</div>
    <div style="position:relative;width:100%;height:170px"><canvas id="chartProjLoad" role="img" aria-label="Obciążenie tygodniowe projektów"></canvas></div>
  </div>`;
}

function initChartProj() {
  const W = weeks();
  const loads = W.map(w=>state.projects.reduce((a,p)=>a+p.stages.filter(s=>w>=s.start&&w<s.start+s.dur).length,0));
  const gc = matchMedia('(prefers-color-scheme:dark)').matches?'rgba(255,255,255,.07)':'rgba(0,0,0,.07)';
  if(chartProjInst) chartProjInst.destroy();
  const el = document.getElementById('chartProjLoad'); if(!el)return;
  chartProjInst = new Chart(el,{type:'bar',data:{labels:W.map(w=>`T${w}`),datasets:[{data:loads,backgroundColor:W.map(w=>{const n=getProjOverlap(w);return n>=3?'rgba(226,75,74,.65)':n>=2?'rgba(186,117,23,.6)':'rgba(55,138,221,.5)';}),borderWidth:0,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>`Tydzień ${c[0].label}`,label:c=>`Etapów: ${c.raw}`,afterLabel:c=>`Projektów jednocześnie: ${getProjOverlap(c.dataIndex+1)}`}}},scales:{x:{ticks:{color:'#888780',font:{size:10},autoSkip:true,maxTicksLimit:12},grid:{color:gc}},y:{beginAtZero:true,ticks:{color:'#888780',stepSize:1},grid:{color:gc}}}}});
}

/* ══════════════════════════════
   RENDER: DASHBOARD PODWYKONAWCY
══════════════════════════════ */
function renderDashSub() {
  const W = weeks();
  const cs = detectConflicts();
  const actSubs = state.subs.filter(s=>state.projects.some(p=>p.stages.some(st=>st.subId===s.id)));
  const uConf = new Set(cs.map(c=>c.sub)).size;
  const peak = W.reduce((best,w)=>getWeekSubLoad(w)>getWeekSubLoad(best)?w:best,1);
  const alertHtml = cs.length ? `<div class="alert-danger">
    <div style="font-size:13px;font-weight:500;color:var(--tx-danger);margin-bottom:6px">Wykryte konflikty — ${cs.length} tygodnie z nakładającymi się zleceniami</div>
    ${Object.entries(cs.reduce((g,c)=>{if(!g[c.sub])g[c.sub]=[];g[c.sub].push(c);return g;},{})).map(([sub,items])=>`<div style="font-size:12px;color:var(--tx-danger);margin-bottom:2px;padding-left:8px">· ${sub}: ${items.map(i=>`T${i.week} (${i.projs})`).join(', ')}</div>`).join('')}
  </div>` : '';

  const wHead = W.map(w=>{const n=getWeekSubLoad(w);return`<div class="wc ${n>=4?'ov':n>=3?'hi':''}">T${w}</div>`;}).join('');
  const subRows = actSubs.map(sub=>{
    const byWeek={};
    state.projects.forEach((p,pi)=>p.stages.filter(s=>s.subId===sub.id).forEach(s=>{for(let w=s.start;w<s.start+s.dur;w++){if(!byWeek[w])byWeek[w]=[];byWeek[w].push({proj:p,stage:s,pi});}}));
    const totalW=Object.keys(byWeek).length;
    const hasConf=Object.entries(byWeek).some(([w,e])=>new Set(e.map(x=>x.proj.id)).size>1);
    const sb=hasConf?`<span class="badge g-red" style="font-size:10px">konflikt</span>`:totalW?`<span class="badge g-green" style="font-size:10px">${totalW} tyg.</span>`:'';
    const cells=W.map(w=>{
      const entries=byWeek[w];if(!entries||!entries.length)return`<div class="bc"></div>`;
      const uP=[...new Set(entries.map(e=>e.proj.id))];const isC=uP.length>1;
      const pi=entries[0].pi;const col=isC?'#E24B4A':PROJ_HEX[pi%PROJ_HEX.length];
      const op=entries[0].stage.status==='done'?1:entries[0].stage.status==='inprogress'?.8:.45;
      return`<div class="bc"><div class="bfill" style="background:${col};opacity:${op}" onmouseenter="showTip(this,'<b>T${w}</b><br>${entries.map(e=>e.stage.name+' · '+(e.proj.short||e.proj.name)).join('<br>')}')" onmouseleave="hideTip()"></div>${isC?'<div class="cmark"></div>':''}</div>`;
    }).join('');
    return`<div class="bar-row"><div class="row-lbl" style="width:170px"><div style="display:flex;align-items:center;gap:4px"><span style="font-size:13px;font-weight:500;color:var(--tx1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:128px">${sub.name}</span>${sb}</div><div style="font-size:10px;color:var(--tx2)">${totalW} tyg. pracy</div></div><div class="bar-cells">${cells}</div></div>`;
  }).join('');
  const loadRow = W.map(w=>{const n=getWeekSubLoad(w);if(!n)return`<div class="div-c"></div>`;const mx=Math.max(...W.map(ww=>getWeekSubLoad(ww)));const col=n>=4?'#E24B4A':n>=3?'#BA7517':'#378ADD';return`<div class="div-c"><div class="div-fill" style="background:${col};opacity:.5;top:${20-Math.round((n/mx)*16)}px"></div></div>`;}).join('');

  return `<div class="stats">
    <div class="stat"><div class="sl">Aktywni podwykonawcy</div><div class="sv">${actSubs.length}</div></div>
    <div class="stat"><div class="sl">Konflikty</div><div class="sv" style="color:${cs.length?'#E24B4A':'inherit'}">${cs.length}</div><div class="ss">tygodni</div></div>
    <div class="stat"><div class="sl">Z konfliktami</div><div class="sv" style="color:${uConf?'#BA7517':'inherit'}">${uConf}</div><div class="ss">podwykonawców</div></div>
    <div class="stat"><div class="sl">Szczyt obciążenia</div><div class="sv">T${peak}</div><div class="ss">${getWeekSubLoad(peak)} ekip</div></div>
  </div>
  ${alertHtml}
  <div class="card" style="margin-bottom:1.25rem">
    <div class="slbl">Harmonogram podwykonawców — tygodniowy</div>
    <div style="display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
      <span style="font-size:12px;color:var(--tx2)">Pokaż:</span>
      <button class="fbtn ${state.dashSubFilter==='all'?'active':''}" onclick="state.dashSubFilter='all';render()">Wszyscy</button>
      <button class="fbtn ${state.dashSubFilter==='conflict'?'active':''}" onclick="state.dashSubFilter='conflict';render()">Tylko konflikty</button>
    </div>
    <div class="legend">${state.projects.map((p,i)=>`<span><span class="lsq" style="background:${PROJ_HEX[i]}"></span>${p.short||p.name}</span>`).join('')}<span><span class="lsq" style="background:#E24B4A"></span>konflikt</span></div>
    <div class="tl-wrap"><div class="tl-inner">
      <div class="wh-row"><div class="row-lbl" style="width:170px"></div><div class="row-cells">${wHead}</div></div>
      ${state.dashSubFilter==='conflict'?subRows.split('</div>').filter((_,i,a)=>i<a.length-1).map((r,i)=>{const sub=actSubs[i];if(!sub)return'';const hasC=detectConflicts().some(c=>c.sub===sub.name);return hasC?r+'</div>':'';}).join(''):subRows}
      <div class="div-row" style="margin-top:10px"><div class="row-lbl" style="width:170px;font-size:11px;font-weight:500;color:var(--tx2)">Obciążenie łączne</div><div class="div-cells">${loadRow}</div></div>
    </div></div>
  </div>
  <div class="card">
    <div class="slbl">Liczba aktywnych podwykonawców w tygodniu</div>
    <div style="position:relative;width:100%;height:160px"><canvas id="chartSubLoad" role="img" aria-label="Podwykonawcy tygodniowo"></canvas></div>
  </div>`;
}

function initChartSub() {
  const W = weeks();
  const loads = W.map(w=>getWeekSubLoad(w));
  const gc = matchMedia('(prefers-color-scheme:dark)').matches?'rgba(255,255,255,.07)':'rgba(0,0,0,.07)';
  if(chartSubInst) chartSubInst.destroy();
  const el = document.getElementById('chartSubLoad'); if(!el)return;
  chartSubInst = new Chart(el,{type:'bar',data:{labels:W.map(w=>`T${w}`),datasets:[{data:loads,backgroundColor:loads.map(n=>n>=4?'rgba(226,75,74,.65)':n>=3?'rgba(186,117,23,.6)':'rgba(55,138,221,.5)'),borderWidth:0,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>`Tydzień ${c[0].label}`,label:c=>`Podwykonawców: ${c.raw}`}}},scales:{x:{ticks:{color:'#888780',font:{size:10},autoSkip:true,maxTicksLimit:12},grid:{color:gc}},y:{beginAtZero:true,ticks:{color:'#888780',stepSize:1},grid:{color:gc}}}}});
}

/* ══════════════════════════════
   RENDER: MODAL
══════════════════════════════ */

    inner = `<div class="mtitle">${m.type==='editproj'?'Edytuj projekt':'Nowy plac budowy'}</div>
      <div class="frow"><label>Nazwa projektu</label><input id="m-name" value="${p.name||''}" placeholder="np. Osiedle Różana"></div>
      <div class="two-col">
        <div class="frow"><label>Miejscowość</label><input id="m-loc" value="${p.location||''}" placeholder="np. Żywiec"></div>

      </div>
      <div class="frow"><label>Klient</label><input id="m-client" value="${p.client||''}" placeholder="np. Jan Kowalski"></div>

  } else if(m.type==='addstage') {
    const p = getProj(state.selProjId);

    inner = `<div class="mtitle">Nowy etap – ${p.name}</div>
      <div class="frow"><label>Nazwa etapu</label><input id="s-name" placeholder="np. Tynki wewnętrzne"></div>
      <div class="frow"><label>Podwykonawca</label><select id="s-sub"><option value="">— bez podwykonawcy —</option>${subOpts}</select></div>
      <div class="two-col">
        <div class="frow"><label>Tydzień start</label><input id="s-start" type="number" value="1" min="1" max="${p.weeks}"></div>
        <div class="frow"><label>Czas trwania (tyg.)</label><input id="s-dur" type="number" value="2" min="1"></div>
      </div>
      <div class="frow"><label>Status</label><select id="s-status">
        <option value="notstarted">Nie rozpoczęty</option><option value="planned">Planowany</option>
        <option value="inprogress">W trakcie</option><option value="done">Zakończony</option><option value="delayed">Opóźniony</option>
      </select></div>
      <div class="mbtns"><button class="btn" onclick="closeModal()">Anuluj</button><button class="btn btn-primary" onclick="addStage()">Dodaj etap</button></div>`;
  } else if(m.type==='editstage') {
    const p = getProj(state.selProjId);
    const s = p.stages.find(st=>st.id===m.stageId);
    if(!s) return '';
    const subOpts = state.subs.map(sub=>`<option value="${sub.id}" ${sub.id===s.subId?'selected':''}>${sub.name}</option>`).join('');
    const statOpts = ['notstarted','planned','inprogress','done','delayed'].map(v=>`<option value="${v}" ${v===s.status?'selected':''}>${STAT_LBL[v]}</option>`).join('');
    inner = `<div class="mtitle">Edytuj etap</div>
      <div class="frow"><label>Nazwa etapu</label><input id="es-name" value="${s.name}"></div>
      <div class="frow"><label>Podwykonawca</label><select id="es-sub"><option value="">— bez podwykonawcy —</option>${subOpts}</select></div>
      <div class="two-col">
        <div class="frow"><label>Tydzień start</label><input id="es-start" type="number" value="${s.start}" min="1" max="${p.weeks}"></div>
        <div class="frow"><label>Czas trwania (tyg.)</label><input id="es-dur" type="number" value="${s.dur}" min="1"></div>
      </div>
      <div class="frow"><label>Status</label><select id="es-status">${statOpts}</select></div>
      <div class="mbtns"><button class="btn" onclick="closeModal()">Anuluj</button><button class="btn btn-primary" onclick="saveStage(${s.id})">Zapisz zmiany</button></div>`;
  } else if(m.type==='addsub'||m.type==='editsub') {
    const s = m.type==='editsub' ? getSub(m.subId) : {};
    inner = `<div class="mtitle">${m.type==='editsub'?'Edytuj podwykonawcę':'Nowy podwykonawca'}</div>
      <div class="frow"><label>Firma</label><input id="sb-name" value="${s.name||''}" placeholder="np. Hydro Serwis"></div>
      <div class="two-col">
        <div class="frow"><label>Osoba kontaktowa</label><input id="sb-contact" value="${s.contact||''}" placeholder="Jan Kowalski"></div>
        <div class="frow"><label>Telefon</label><input id="sb-phone" value="${s.phone||''}" placeholder="600 000 000"></div>
      </div>
      <div class="frow"><label>E-mail</label><input id="sb-email" value="${s.email||''}" placeholder="biuro@firma.pl"></div>
      <div class="frow"><label>Specjalności (oddzielone przecinkiem)</label><input id="sb-specs" value="${(s.specs||[]).join(', ')}" placeholder="np. Instalacje wod-kan, CO"></div>
      <div class="frow"><label>Uwagi</label><input id="sb-notes" value="${s.notes||''}" placeholder="np. Wymaga zaliczki 30%"></div>
      <div class="frow"><label>Status</label><select id="sb-active">
        <option value="1" ${s.active!==false?'selected':''}>Aktywny</option>
        <option value="0" ${s.active===false?'selected':''}>Nieaktywny</option>
      </select></div>
      <div class="mbtns"><button class="btn" onclick="closeModal()">Anuluj</button><button class="btn btn-primary" onclick="${m.type==='editsub'?'saveSub('+m.subId+')':'addSub()'}">Zapisz</button></div>`;
  }
  return `<div class="modal-bg" onclick="bgClose(event)"><div class="modal" onclick="event.stopPropagation()">${inner}</div></div>`;
}

/* ══════════════════════════════
   MAIN RENDER
══════════════════════════════ */
function render() {
  const root = document.getElementById('root');
  if(!state.authenticated) { root.innerHTML = renderLogin(); return; }
  if(state.loading) { root.innerHTML = `<div class="shell"><div class="loading">Ładowanie danych…</div></div>`; return; }

  let content = '';
  if(state.view==='projects')   content = renderProjects();
  else if(state.view==='gantt') content = renderGantt();
  else if(state.view==='subs')  content = renderSubsView();
  else if(state.view==='dash-proj') content = renderDashProj();
  else if(state.view==='dash-sub')  content = renderDashSub();

  root.innerHTML = `<div class="shell">${renderTopbar()}${content}${renderModal()}</div>`;
  if(state.view==='dash-proj') setTimeout(initChartProj, 50);
  if(state.view==='dash-sub')  setTimeout(initChartSub, 50);
}

function rerenderSubsList() {
  const el = document.getElementById('subs-list'); if(el) el.innerHTML = renderSubsList();
  const det = document.getElementById('sub-detail'); if(det) det.innerHTML = renderSubDetail();
}

/* ══════════════════════════════
   ACTIONS
══════════════════════════════ */
function setView(v) { state.view=v; render(); }
function selectProj(id) { state.selProjId=id; state.view='gantt'; render(); }
function goSub(id) { state.selSubId=id; state.view='subs'; render(); }
function selSub(id) {
  state.selSubId=id;
  const det=document.getElementById('sub-detail');
  if(det) det.innerHTML=renderSubDetail(); else render();
}
function openModal(type, subId, stageId) { state.modal={type,subId,stageId}; render(); }
function closeModal() { state.modal=null; render(); }
function bgClose(e) { if(e.target.classList.contains('modal-bg')) closeModal(); }

async function addProj() {
  const name=val('m-name'); if(!name)return;
  const r = await api('POST','/api/projects',{name,short:name.split(' ')[0],location:val('m-loc')||'—',client:val('m-client')||'—',weeks:+val('m-weeks')||16,progress:0});
  if(r){toast('Projekt dodany');closeModal();await loadData();state.selProjId=r.id;state.view='gantt';render();}
}
async function saveProj() {
  const p=getProj(state.selProjId);if(!p)return;
  await api('PUT',`/api/projects/${p.id}`,{name:val('m-name')||p.name,short:(val('m-name')||p.name).split(' ')[0],location:val('m-loc'),client:val('m-client'),weeks:+val('m-weeks')||p.weeks});
  toast('Zapisano');closeModal();await loadData();render();
}
async function deleteProj(id) {
  if(!confirm('Usunąć projekt i wszystkie jego etapy?'))return;
  await api('DELETE',`/api/projects/${id}`);
  toast('Projekt usunięty');state.selProjId=state.projects[0]?.id||null;await loadData();state.view='projects';render();
}
async function addStage() {
  const p=getProj(state.selProjId);if(!p)return;
  const name=val('s-name');if(!name)return;
  await api('POST',`/api/projects/${p.id}/stages`,{name,subId:val('s-sub')?+val('s-sub'):null,start:+val('s-start')||1,dur:+val('s-dur')||2,status:val('s-status')||'planned'});
  toast('Etap dodany');closeModal();await loadData();render();
}
async function addSub() {
  const name=val('sb-name');if(!name)return;
  await api('POST','/api/subcontractors',{name,contact:val('sb-contact'),phone:val('sb-phone'),email:val('sb-email'),specs:val('sb-specs').split(',').map(x=>x.trim()).filter(Boolean),notes:val('sb-notes'),active:val('sb-active')!=='0'});
  toast('Podwykonawca dodany');closeModal();await loadData();render();
}
async function saveSub(id) {
  await api('PUT',`/api/subcontractors/${id}`,{name:val('sb-name'),contact:val('sb-contact'),phone:val('sb-phone'),email:val('sb-email'),specs:val('sb-specs').split(',').map(x=>x.trim()).filter(Boolean),notes:val('sb-notes'),active:val('sb-active')!=='0'});
  toast('Zapisano');closeModal();await loadData();render();
}
async function deleteSub(id) {
  if(!confirm('Usunąć podwykonawcę?'))return;
  await api('DELETE',`/api/subcontractors/${id}`);
  toast('Usunięto');state.selSubId=null;await loadData();render();
}

async function quickStatus(stageId, newStatus) {
  const p = getProj(state.selProjId); if(!p) return;
  const s = p.stages.find(st=>st.id===stageId); if(!s) return;
  await api('PUT',`/api/stages/${stageId}`,{...s, status:newStatus});
  toast('Status zmieniony');
  await loadData(); render();
}

async function saveStage(stageId) {
  const p = getProj(state.selProjId); if(!p) return;
  const s = p.stages.find(st=>st.id===stageId); if(!s) return;
  const name = val('es-name'); if(!name) return;
  const subId = val('es-sub') ? +val('es-sub') : null;
  await api('PUT',`/api/stages/${stageId}`,{
    name, subId, start:+val('es-start')||s.start,
    dur:+val('es-dur')||s.dur, status:val('es-status')||s.status
  });
  toast('Etap zaktualizowany'); closeModal(); await loadData(); render();
}

async function deleteStage(stageId) {
  if(!confirm('Usunąć ten etap?')) return;
  await api('DELETE',`/api/stages/${stageId}`);
  toast('Etap usunięty'); await loadData(); render();
}

/* ══════════════════════════════
   INIT
══════════════════════════════ */
(async()=>{
  try {
    state.loading = false;
    render(); // najpierw pokaż ekran logowania
    const me = await api('GET','/api/me');
    if(me && me.authenticated){
      state.authenticated=true;
      state.loading=true;
      render();
      await loadData();
    } else {
      state.authenticated=false;
      state.loading=false;
      render();
    }
  } catch(e) {
    state.authenticated=false;
    state.loading=false;
    render();
  }
})();
</script>
</body>
</html>
