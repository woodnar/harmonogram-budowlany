<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonogramy budowlane</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg1:#fff;--bg2:#f5f5f3;--bg3:#eeece7;--bgi:#e6f1fb;--bgd:#fcebeb;--bgs:#eaf3de;--bgw:#faeeda;--tx1:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;--txi:#185fa5;--txd:#a32d2d;--txs:#3b6d11;--txw:#854f0b;--bd3:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);--bdi:#378add;--rmd:8px;--rlg:12px}
@media(prefers-color-scheme:dark){:root{--bg1:#1e1e1c;--bg2:#2a2a28;--bg3:#333330;--bgi:#0c3558;--bgd:#3d1515;--bgs:#1a3308;--bgw:#3d2504;--tx1:#f0ede6;--tx2:#b4b2a9;--tx3:#888780;--txi:#85b7eb;--txd:#f09595;--txs:#97c459;--txw:#ef9f27;--bd3:rgba(255,255,255,.10);--bd2:rgba(255,255,255,.20)}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--tx1);min-height:100vh}
.shell{max-width:1140px;margin:0 auto;padding:1.5rem 1rem}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.lb{background:var(--bg1);border:0.5px solid var(--bd3);border-radius:var(--rlg);padding:2rem;width:100%;max-width:360px}
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem}
.tabs{display:flex;gap:3px;background:var(--bg2);border-radius:var(--rmd);padding:3px;flex-wrap:wrap}
.tab{font-size:13px;padding:5px 11px;border-radius:6px;border:none;background:transparent;color:var(--tx2);cursor:pointer}
.tab.on{background:var(--bg1);color:var(--tx1);font-weight:500;border:0.5px solid var(--bd3)}
.btn{font-size:13px;padding:6px 13px;border-radius:var(--rmd);border:0.5px solid var(--bd2);background:var(--bg1);color:var(--tx1);cursor:pointer}
.btn:hover{background:var(--bg2)}
.bp{background:var(--bgi);color:var(--txi);border-color:transparent}.bp:hover{opacity:.85}
.card{background:var(--bg1);border:0.5px solid var(--bd3);border-radius:var(--rlg);padding:14px 16px;margin-bottom:9px}
.card.sel{border:1.5px solid var(--bdi)}.card.cp:hover{border-color:var(--bd2);cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:var(--bg2);border-radius:var(--rmd);padding:12px 14px}
.sl{font-size:12px;color:var(--tx2);margin-bottom:3px}.sv{font-size:22px;font-weight:500}.ss{font-size:11px;color:var(--tx3);margin-top:2px}
.slbl{font-size:12px;font-weight:500;color:var(--tx2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:9px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.gg{background:#EAF3DE;color:#3B6D11}.gb{background:#E6F1FB;color:#185FA5}.gy{background:#F1EFE8;color:#5F5E5A}.gr{background:#FCEBEB;color:#A32D2D}.ga{background:#FAEEDA;color:#854F0B}.gt{background:#E1F5EE;color:#0F6E56}.gp{background:#EEEDFE;color:#534AB7}.gc{background:#FAECE7;color:#993C1D}
@media(prefers-color-scheme:dark){.gg{background:#1a3308;color:#97c459}.gb{background:#0c3558;color:#85b7eb}.gy{background:#2a2a28;color:#b4b2a9}.gr{background:#3d1515;color:#f09595}.ga{background:#3d2504;color:#ef9f27}.gt{background:#04342c;color:#5dcaa5}.gp{background:#26215c;color:#afa9ec}.gc{background:#4a1b0c;color:#f0997b}}
.pbar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}.pfill{height:100%;border-radius:3px}
.ava{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
.chip{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg2);color:var(--tx2);border:0.5px solid var(--bd3)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.gw{overflow-x:auto;margin-top:10px}
.gtbl{width:100%;border-collapse:collapse}
.gtbl th{font-size:11px;color:var(--tx2);font-weight:500;text-align:left;padding:4px 5px 7px;border-bottom:0.5px solid var(--bd3)}
.gtbl td{padding:4px 5px;vertical-align:middle;border-bottom:0.5px solid var(--bd3)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:center;padding-top:60px;z-index:100}
.mbox{background:var(--bg1);border:0.5px solid var(--bd2);border-radius:var(--rlg);padding:20px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.mt2{font-size:15px;font-weight:500;margin-bottom:13px}
.fr{margin-bottom:11px}.fr label{display:block;font-size:12px;color:var(--tx2);margin-bottom:4px}
.fr input,.fr select,.fr textarea{width:100%;font-size:13px;padding:7px 10px;border:0.5px solid var(--bd2);border-radius:var(--rmd);background:var(--bg2);color:var(--tx1)}
.fr textarea{resize:vertical}
.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mbs{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.6fr);gap:14px}
.act{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px;padding-top:13px;border-top:0.5px solid var(--bd3)}
.alr{background:var(--bgd);border:0.5px solid rgba(163,45,45,.25);border-radius:var(--rmd);padding:10px 14px;margin-bottom:14px}
.tlw{overflow-x:auto}.tli{min-width:660px}
.whr{display:flex;align-items:center;margin-bottom:5px}
.rl{flex-shrink:0;padding-right:10px}.rc{display:flex;flex:1}
.wc{flex:1;min-width:19px;text-align:center;font-size:10px;color:var(--tx3)}
.wc.hi{color:#BA7517;font-weight:500}.wc.ov{color:#E24B4A;font-weight:500}
.br2{display:flex;align-items:center;margin-bottom:5px}
.bc2{display:flex;flex:1;height:26px}.bc{flex:1;min-width:19px;position:relative}
.bf{position:absolute;inset:3px 1px;border-radius:3px;cursor:pointer}.bf:hover{opacity:.65!important}
.cm2{position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#E24B4A;z-index:2}
.dvr{display:flex;align-items:center;margin:8px 0 4px}
.dc2{display:flex;flex:1;height:18px}.dc{flex:1;min-width:19px;position:relative}
.df{position:absolute;inset:2px 1px;border-radius:2px}
.leg{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:13px;font-size:11px;color:var(--tx2)}
.lsq{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.fbtn{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--bd2);background:var(--bg1);color:var(--tx2);cursor:pointer}
.fbtn.on{background:var(--bgi);color:var(--txi);border-color:transparent;font-weight:500}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--tx1);color:var(--bg1);font-size:13px;padding:10px 18px;border-radius:var(--rmd);z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.spin{display:flex;align-items:center;justify-content:center;height:200px;color:var(--tx2);font-size:14px}
.abtn{font-size:11px;padding:2px 8px;border-radius:6px;border:0.5px solid var(--bd2);background:var(--bg2);color:var(--tx2);cursor:pointer;white-space:nowrap}
.abtn.rd{color:var(--txd)}
.note-pill{font-size:11px;color:var(--txw);font-style:italic;display:block;margin-top:2px}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.split{grid-template-columns:1fr}.tab{padding:4px 8px;font-size:12px}}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
var PH=['#378ADD','#1D9E75','#D85A30','#7F77DD','#BA7517'];
var SHX={done:'#639922',inprogress:'#378ADD',planned:'#B4B2A9',delayed:'#E24B4A',notstarted:'#D3D1C7'};
var SLX={done:'Zakończony',inprogress:'W trakcie',planned:'Planowany',delayed:'Opóźniony',notstarted:'Nie rozpoczęty'};
var SCX={done:'gg',inprogress:'gb',planned:'gy',delayed:'gr',notstarted:'gy'};
var ACX=['gb','gt','gp','gc','ga','gg'];
var SNXT={notstarted:{n:'planned',l:'Planowany'},planned:{n:'inprogress',l:'Rozpocznij'},inprogress:{n:'done',l:'Zakończ'},done:{n:'notstarted',l:'Cofnij'},delayed:{n:'inprogress',l:'Wznów'}};
var DSTAGES=['PAB','PT Konstrukcja + plyta','PT Warsztatowo-montazowy','PT Instalacje sanitarne','PT Instalacje elektryczne','Plyta fundamentowa','Wiazary - projekt','Prefabrykacja','Montaz konstrukcji','Montaz pokrycia','Montaz okien','Wylewki','Montaz instalacji sanitarnych','Montaz instalacji elektrycznych','Sufity','Elewacja + drzwi + parapety','Protokol koncowy'];

var S={auth:false,loading:false,view:'projects',projects:[],subs:[],selP:null,selS:null,modal:null,sf:'all',ss:''};
var cpi=null,csi=null;

function GP(id){for(var i=0;i<S.projects.length;i++){if(S.projects[i].id===id)return S.projects[i];}return null;}
function GS(id){for(var i=0;i<S.subs.length;i++){if(S.subs[i].id===id)return S.subs[i];}return null;}
function ini(n){var p=n.split(' ').slice(0,2);return p.map(function(w){return w[0];}).join('').toUpperCase();}
function acls(id){return ACX[id%ACX.length];}
function V(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function bdg(s){return '<span class="badge '+SCX[s]+'">'+SLX[s]+'</span>';}
function MW(){var m=1;S.projects.forEach(function(p){if(p.weeks>m)m=p.weeks;});return m;}
function WS(){var a=[];for(var i=1;i<=MW();i++)a.push(i);return a;}
function CP(p){var st=p.stages||[];if(!st.length)return 0;var d=0;st.forEach(function(s){if(s.status==='done')d++;});return Math.round(d/st.length*100);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toast(msg){var e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(function(){e.classList.remove('show');},2500);}

function subUsage(sid){
  var r=[];
  S.projects.forEach(function(p){
    (p.stages||[]).forEach(function(s){if(s.subId===sid)r.push({proj:p.name,stage:s.name,status:s.status});});
  });
  return r;
}

function getConflicts(){
  var cs=[];
  S.subs.forEach(function(sub){
    var bw={};
    S.projects.forEach(function(p,pi){
      (p.stages||[]).forEach(function(s){
        if(s.subId!==sub.id)return;
        for(var w=s.start;w<s.start+s.dur;w++){if(!bw[w])bw[w]=[];bw[w].push({proj:p,pi:pi});}
      });
    });
    Object.keys(bw).forEach(function(w){
      var e=bw[w];var ids=[];
      e.forEach(function(x){if(ids.indexOf(x.proj.id)<0)ids.push(x.proj.id);});
      if(ids.length>1){
        var names=ids.map(function(id){var px=GP(id);return px?px.short||px.name:'?';});
        cs.push({sub:sub.name,week:+w,projs:names.join(' + ')});
      }
    });
  });
  return cs;
}

function wsl(w){
  var ids={};
  S.projects.forEach(function(p){
    (p.stages||[]).forEach(function(s){if(w>=s.start&&w<s.start+s.dur&&s.subId)ids[s.subId]=true;});
  });
  return Object.keys(ids).length;
}
function wpo(w){
  var n=0;
  S.projects.forEach(function(p){
    var has=false;
    (p.stages||[]).forEach(function(s){if(w>=s.start&&w<s.start+s.dur)has=true;});
    if(has)n++;
  });
  return n;
}

function api(m,u,b){
  return fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined}).then(function(r){
    if(r.status===401){S.auth=false;render();return null;}
    return r.json();
  }).catch(function(){toast('Blad polaczenia');return null;});
}
function loadData(){
  return Promise.all([api('GET','/api/projects'),api('GET','/api/subcontractors')]).then(function(res){
    if(res[0])S.projects=res[0];
    if(res[1])S.subs=res[1];
    if(S.projects.length&&!S.selP)S.selP=S.projects[0].id;
    S.loading=false;render();
  });
}

function rLogin(){
  return '<div class="lw"><div class="lb">'
    +'<div style="font-size:18px;font-weight:500;margin-bottom:6px">Harmonogramy budowlane</div>'
    +'<div style="font-size:13px;color:var(--tx2);margin-bottom:1.5rem">Zaloguj sie haslem zespolu</div>'
    +'<div class="fr"><label>Haslo zespolu</label><input type="password" id="pw" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" onkeydown="if(event.key===\'Enter\')doLogin()"></div>'
    +'<div id="lerr" style="font-size:12px;color:var(--txd);margin-bottom:10px;display:none">Nieprawidlowe haslo.</div>'
    +'<button class="btn bp" style="width:100%" onclick="doLogin()">Zaloguj sie</button>'
    +'</div></div>';
}
function doLogin(){
  api('POST','/api/login',{password:V('pw')}).then(function(r){
    if(r&&r.ok){S.auth=true;S.loading=true;render();loadData();}
    else{var e=document.getElementById('lerr');if(e)e.style.display='block';}
  });
}
function doLogout(){api('POST','/api/logout').then(function(){S.auth=false;S.projects=[];S.subs=[];render();});}

function rTop(){
  var tabs=['projects:Projekty','gantt:Harmonogram','subs:Podwykonawcy','dp:Dashboard projektow','ds:Dashboard podwykonawcow'];
  var t=tabs.map(function(x){var p=x.split(':');return '<button class="tab '+(S.view===p[0]?'on':'')+'" onclick="sv(\''+p[0]+'\')">'+p[1]+'</button>';}).join('');
  var isSubs=S.view==='subs';
  return '<div class="topbar">'
    +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
    +'<span style="font-size:15px;font-weight:500">Harmonogramy budowlane</span>'
    +'<div class="tabs">'+t+'</div></div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
    +'<button class="btn bp" onclick="om(\''+(isSubs?'as':'np')+'\')">+ '+(isSubs?'Nowy podwykonawca':'Nowy projekt')+'</button>'
    +'<button class="btn" style="font-size:12px;padding:4px 10px" onclick="exportAll()">Pobierz Excel</button>'
    +'<button class="btn" style="font-size:12px;padding:4px 10px" onclick="doLogout()">Wyloguj</button>'
    +'</div></div>';
}

function rProjects(){
  var del=0;S.projects.forEach(function(p){(p.stages||[]).forEach(function(s){if(s.status==='delayed')del++;});});
  var avg=S.projects.length?Math.round(S.projects.reduce(function(a,p){return a+CP(p);},0)/S.projects.length):0;
  var actS=S.subs.filter(function(s){return s.active;}).length;
  var rows=S.projects.map(function(p){
    var pr=CP(p);
    var isDel=false;(p.stages||[]).forEach(function(s){if(s.status==='delayed')isDel=true;});
    var col=isDel?'#E24B4A':pr>=80?'#639922':'#378ADD';
    var st=isDel?'delayed':pr===100?'done':pr>0?'inprogress':'notstarted';
    return '<div class="card cp '+(p.id===S.selP?'sel':'')+'" onclick="selP('+p.id+')">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
      +'<span style="font-size:14px;font-weight:500">'+esc(p.name)+'</span>'+bdg(st)+'</div>'
      +'<div style="font-size:12px;color:var(--tx2);margin-bottom:5px">'+esc(p.location)+' &middot; '+esc(p.client)+' &middot; '+p.weeks+' tyg. &middot; '+(p.stages||[]).length+' etapow</div>'
      +(p.phone||p.email?'<div style="font-size:12px;margin-bottom:5px">'+(p.phone?'<a href="tel:'+esc(p.phone)+'" style="color:var(--txi)" onclick="event.stopPropagation()">'+esc(p.phone)+'</a> ':'')+' '+(p.email?'<a href="mailto:'+esc(p.email)+'" style="color:var(--txi)" onclick="event.stopPropagation()">'+esc(p.email)+'</a>':'')+'</div>':'')
      +(p.notes?'<div style="font-size:11px;color:var(--tx3);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(p.notes)+'</div>':'')
      +'<div style="display:flex;align-items:center;gap:10px">'
      +'<div class="pbar" style="flex:1"><div class="pfill" style="width:'+pr+'%;background:'+col+'"></div></div>'
      +'<span style="font-size:12px;color:var(--tx2)">'+pr+'%</span></div></div>';
  }).join('');
  return '<div class="stats">'
    +'<div class="stat"><div class="sl">Projekty</div><div class="sv">'+S.projects.length+'</div></div>'
    +'<div class="stat"><div class="sl">Postep sredni</div><div class="sv">'+avg+'%</div></div>'
    +'<div class="stat"><div class="sl">Opoznienia</div><div class="sv" style="color:'+(del?'#E24B4A':'')+'">'+del+'</div><div class="ss">etapow</div></div>'
    +'<div class="stat"><div class="sl">Podwykonawcy</div><div class="sv">'+actS+'</div><div class="ss">aktywnych</div></div>'
    +'</div><div class="slbl">Projekty</div>'+rows;
}

function rGantt(){
  var p=GP(S.selP);if(!p)return '<div class="spin">Wybierz projekt</div>';
  var ws=WS().slice(0,p.weeks);
  var wc=ws.map(function(w){return '<th style="min-width:26px;width:26px;text-align:center;font-size:10px">T'+w+'</th>';}).join('');
  var rows=(p.stages||[]).map(function(s){
    var sub=GS(s.subId);
    var col=SHX[s.status];
    var op=s.status==='done'?1:s.status==='inprogress'?.75:.35;
    var cells=ws.map(function(w){
      if(w<s.start||w>=s.start+s.dur)return '<td></td>';
      var r1=w===s.start?'3px':'0';var r2=w===s.start+s.dur-1?'3px':'0';
      return '<td style="padding:3px 1px"><div style="height:13px;background:'+col+';opacity:'+op+';border-radius:'+r1+' '+r2+' '+r2+' '+r1+'"></div></td>';
    }).join('');
    var subName=sub?'<span style="font-size:11px;color:var(--tx2);cursor:pointer;text-decoration:underline dotted" onclick="goSub('+sub.id+')">'+esc(sub.name)+'</span>':'<span style="font-size:11px;color:var(--tx3)">brak</span>';
    var noteHtml=s.notes?'<span class="note-pill">'+esc(s.notes)+'</span>':'';
    var nx=SNXT[s.status];
    return '<tr>'
      +'<td style="font-size:13px;min-width:140px;max-width:160px">'+esc(s.name)+'<br>'+subName+noteHtml+'</td>'
      +'<td style="padding:4px 5px">'+bdg(s.status)+'</td>'
      +'<td style="padding:3px 5px;white-space:nowrap">'
      +'<button class="abtn" onclick="qSt('+s.id+',\''+nx.n+'\')">'+nx.l+'</button> '
      +'<button class="abtn" onclick="om(\'es\',null,'+s.id+')">Edytuj</button> '
      +'<button class="abtn rd" onclick="delStg('+s.id+')">&#x2715;</button>'
      +'</td>'+cells+'</tr>';
  }).join('');
  var isDel=false;(p.stages||[]).forEach(function(s){if(s.status==='delayed')isDel=true;});
  var done=0;(p.stages||[]).forEach(function(s){if(s.status==='done')done++;});
  return '<div class="card">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:13px;flex-wrap:wrap;gap:8px">'
    +'<div><div style="font-size:15px;font-weight:500">'+esc(p.name)+'</div>'
    +'<div style="font-size:12px;color:var(--tx2);margin-top:3px">'+esc(p.location)+' &middot; '+esc(p.client)+(p.phone?' &middot; <a href="tel:'+esc(p.phone)+'" style="color:var(--txi)">'+esc(p.phone)+'</a>':'')+(p.email?' &middot; <a href="mailto:'+esc(p.email)+'" style="color:var(--txi)">'+esc(p.email)+'</a>':'')+'</div>'
    +(p.notes?'<div style="font-size:12px;color:var(--tx2);margin-top:5px;padding:7px 10px;background:var(--bgw);border-radius:var(--rmd)">'+esc(p.notes)+'</div>':'')
    +'</div>'
    +'<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'+bdg(isDel?'delayed':'inprogress')
    +' <button class="btn" onclick="om(\'ep\')">Edytuj projekt</button>'
    +' <button class="btn" onclick="exportXls('+p.id+')">Excel</button>'
    +' <button class="btn" style="color:var(--txd)" onclick="delProj('+p.id+')">Usun</button>'
    +'</div></div>'
    +'<div class="stats" style="margin-bottom:13px">'
    +'<div class="stat"><div class="sl">Postep</div><div class="sv">'+CP(p)+'%</div></div>'

function rDS(){
  var W=WS();var cs=getConflicts();
  var actS=[];S.subs.forEach(function(s){var has=false;S.projects.forEach(function(p){(p.stages||[]).forEach(function(st){if(st.subId===s.id)has=true;});});if(has)actS.push(s);});
  var uC=[];cs.forEach(function(c){if(uC.indexOf(c.sub)<0)uC.push(c.sub);});
  var peak=1;W.forEach(function(w){if(wsl(w)>wsl(peak))peak=w;});
  var grp={};cs.forEach(function(c){if(!grp[c.sub])grp[c.sub]=[];grp[c.sub].push(c);});
  var alr=cs.length?'<div class="alr"><div style="font-size:13px;font-weight:500;color:var(--txd);margin-bottom:6px">Wykryte konflikty &mdash; '+cs.length+' tygodni</div>'+Object.keys(grp).map(function(sub){return '<div style="font-size:12px;color:var(--txd);margin-bottom:2px;padding-left:8px">&middot; '+esc(sub)+': '+grp[sub].map(function(i){return 'T'+i.week+' ('+esc(i.projs)+')';}).join(', ')+'</div>';}).join('')+'</div>':'';
  var wh=W.map(function(w){var n=wsl(w);return '<div class="wc '+(n>=4?'ov':n>=3?'hi':'')+'">T'+w+'</div>';}).join('');
  var srows=actS.map(function(sub){
    var bw={};
    S.projects.forEach(function(p,pi){(p.stages||[]).forEach(function(s){if(s.subId!==sub.id)return;for(var w=s.start;w<s.start+s.dur;w++){if(!bw[w])bw[w]=[];bw[w].push({proj:p,stage:s,pi:pi});}});});
    var tw=Object.keys(bw).length;
    var hc=false;Object.keys(bw).forEach(function(w){var ids=[];bw[w].forEach(function(e){if(ids.indexOf(e.proj.id)<0)ids.push(e.proj.id);});if(ids.length>1)hc=true;});
    var sb=hc?'<span class="badge gr" style="font-size:10px">konflikt</span>':(tw?'<span class="badge gg" style="font-size:10px">'+tw+' tyg.</span>':'');
    var cells=W.map(function(w){
      var entries=bw[w];if(!entries||!entries.length)return '<div class="bc"></div>';
      var ids=[];entries.forEach(function(e){if(ids.indexOf(e.proj.id)<0)ids.push(e.proj.id);});
      var isC=ids.length>1;var pi=entries[0].pi;
      var col=isC?'#E24B4A':PH[pi%PH.length];
      var op=entries[0].stage.status==='done'?1:entries[0].stage.status==='inprogress'?.8:.45;
      var tip=entries.map(function(e){return e.stage.name+' ('+esc(e.proj.short||e.proj.name)+')'+(e.stage.notes?' - '+e.stage.notes:'');}).join(' | ');
      return '<div class="bc"><div class="bf" style="background:'+col+';opacity:'+op+'" title="'+esc(tip)+'"></div>'+(isC?'<div class="cm2"></div>':'')+'</div>';
    }).join('');
    return '<div class="br2"><div class="rl" style="width:170px"><div style="display:flex;align-items:center;gap:4px"><span style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:125px">'+esc(sub.name)+'</span>'+sb+'</div><div style="font-size:10px;color:var(--tx2)">'+tw+' tyg. pracy</div></div><div class="bc2">'+cells+'</div></div>';
  }).join('');
  var mxLoad=1;W.forEach(function(w){if(wsl(w)>mxLoad)mxLoad=wsl(w);});
  var lr=W.map(function(w){var n=wsl(w);if(!n)return '<div class="dc"></div>';var col=n>=4?'#E24B4A':n>=3?'#BA7517':'#378ADD';return '<div class="dc"><div class="df" style="background:'+col+';opacity:.5;top:'+(20-Math.round((n/mxLoad)*16))+'px"></div></div>';}).join('');
  return '<div class="stats">'
    +'<div class="stat"><div class="sl">Aktywni podwykonawcy</div><div class="sv">'+actS.length+'</div></div>'
    +'<div class="stat"><div class="sl">Konflikty</div><div class="sv" style="color:'+(cs.length?'#E24B4A':'')+'">'+cs.length+'</div></div>'
    +'<div class="stat"><div class="sl">Z konfliktami</div><div class="sv" style="color:'+(uC.length?'#BA7517':'')+'">'+uC.length+'</div></div>'
    +'<div class="stat"><div class="sl">Szczyt obciazenia</div><div class="sv">T'+peak+'</div><div class="ss">'+wsl(peak)+' ekip</div></div>'
    +'</div>'+alr
    +'<div class="card" style="margin-bottom:1.25rem">'
    +'<div class="slbl">Harmonogram podwykonawcow</div>'
    +'<div class="leg">'+S.projects.map(function(p,i){return '<span><span class="lsq" style="background:'+PH[i]+'"></span>'+esc(p.short||p.name)+'</span>';}).join('')+'<span><span class="lsq" style="background:#E24B4A"></span>konflikt</span></div>'
    +'<div class="tlw"><div class="tli">'
    +'<div class="whr"><div class="rl" style="width:170px"></div><div class="rc">'+wh+'</div></div>'
    +srows
    +'<div class="dvr" style="margin-top:10px"><div class="rl" style="width:170px;font-size:11px;font-weight:500;color:var(--tx2)">Obciazenie lacznie</div><div class="dc2">'+lr+'</div></div>'
    +'</div></div></div>'
    +'<div class="card"><div class="slbl">Liczba aktywnych podwykonawcow w tygodniu</div>'
    +'<div style="position:relative;width:100%;height:160px"><canvas id="csl" role="img" aria-label="Podwykonawcy"></canvas></div></div>'
    +rNotesPanel();

      +'</select></div>'
      +'<div class="fr"><label>Notatka do etapu</label><textarea id="snot" rows="2" placeholder="Uwagi, ustalenia z podwykonawca..."></textarea></div>'
      +'<div class="mbs"><button class="btn" onclick="cm()">Anuluj</button><button class="btn bp" onclick="addStg()">Dodaj etap</button></div>';
  } else if(m.t==='es'){
    var p3=GP(S.selP);if(!p3)return '';
    var s=null;(p3.stages||[]).forEach(function(x){if(x.id===m.stgid)s=x;});if(!s)return '';
    var so2=S.subs.map(function(sub){return '<option value="'+sub.id+'"'+(sub.id===s.subId?' selected':'')+'>'+esc(sub.name)+'</option>';}).join('');
    var sto=['notstarted','planned','inprogress','done','delayed'].map(function(v){return '<option value="'+v+'"'+(v===s.status?' selected':'')+'>'+SLX[v]+'</option>';}).join('');
    inner='<div class="mt2">Edytuj etap</div>'
      +'<div class="fr"><label>Nazwa etapu</label><input id="en" value="'+esc(s.name)+'"></div>'
      +'<div class="fr"><label>Podwykonawca</label><select id="eu"><option value="">brak</option>'+so2+'</select></div>'
      +'<div class="two">'
      +'<div class="fr"><label>Tydzien start</label><input id="et" type="number" value="'+s.start+'" min="1" max="'+p3.weeks+'"></div>'
      +'<div class="fr"><label>Czas trwania (tyg.)</label><input id="ed" type="number" value="'+s.dur+'" min="1"></div>'
      +'</div>'
      +'<div class="fr"><label>Status</label><select id="es3">'+sto+'</select></div>'
      +'<div class="fr"><label>Notatka do etapu</label><textarea id="enot" rows="2" placeholder="Uwagi, ustalenia, problemy...">'+esc(s.notes||'')+'</textarea></div>'
      +'<div class="mbs"><button class="btn" onclick="cm()">Anuluj</button><button class="btn bp" onclick="saveStg('+s.id+')">Zapisz zmiany</button></div>';
  } else if(m.t==='as'||m.t==='es2'){
    var s2=m.t==='es2'?GS(m.sid):null;if(!s2)s2={};
    inner='<div class="mt2">'+(m.t==='es2'?'Edytuj podwykonawce':'Nowy podwykonawca')+'</div>'
      +'<div class="fr"><label>Firma</label><input id="bname" value="'+esc(s2.name||'')+'" placeholder="np. Hydro Serwis"></div>'
      +'<div class="two">'
      +'<div class="fr"><label>Osoba kontaktowa</label><input id="bcont" value="'+esc(s2.contact||'')+'" placeholder="Jan Kowalski"></div>'
      +'<div class="fr"><label>Telefon</label><input id="bph" value="'+esc(s2.phone||'')+'" placeholder="600 000 000"></div>'
      +'</div>'
      +'<div class="fr"><label>E-mail</label><input id="bmail" value="'+esc(s2.email||'')+'" placeholder="biuro@firma.pl"></div>'
      +'<div class="fr"><label>Specjalnosci (oddzielone przecinkiem)</label><input id="bspec" value="'+esc((s2.specs||[]).join(', '))+'" placeholder="np. Instalacje, Montaz"></div>'
      +'<div class="fr"><label>Uwagi</label><input id="bnot" value="'+esc(s2.notes||'')+'" placeholder="np. Wymaga zaliczki 30%"></div>'
      +'<div class="fr"><label>Status</label><select id="bact">'
      +'<option value="1"'+(s2.active!==false?' selected':'')+'>Aktywny</option>'
      +'<option value="0"'+(s2.active===false?' selected':'')+'>Nieaktywny</option>'
      +'</select></div>'
      +'<div class="mbs"><button class="btn" onclick="cm()">Anuluj</button><button class="btn bp" onclick="'+(m.t==='es2'?'saveB('+m.sid+')':'addB()')+'">Zapisz</button></div>';
  }
  return '<div class="mbg" onclick="bgC(event)"><div class="mbox" onclick="event.stopPropagation()">'+inner+'</div></div>';
}

function render(){
  var root=document.getElementById('root');if(!root)return;
  if(!S.auth){root.innerHTML=rLogin();return;}
  if(S.loading){root.innerHTML='<div class="shell"><div class="spin">Ladowanie danych...</div></div>';return;}
  var c='';
  if(S.view==='projects')c=rProjects();
  else if(S.view==='gantt')c=rGantt();
  else if(S.view==='subs')c=rSubs();
  else if(S.view==='dp')c=rDP();
  else if(S.view==='ds')c=rDS();
  root.innerHTML='<div class="shell">'+rTop()+c+rModal()+'</div>';
  if(S.view==='dp')setTimeout(initCP,50);
  if(S.view==='ds')setTimeout(initCS,50);
}

function sv(v){S.view=v;render();}
function selP(id){S.selP=id;S.view='gantt';render();}
function goSub(id){S.selS=id;S.view='subs';render();}
function selSub(id){S.selS=id;var d=document.getElementById('sd');if(d)d.innerHTML=rSubDetail();else render();}
function om(t,sid,stgid){S.modal={t:t,sid:sid||null,stgid:stgid||null};render();}
function cm(){S.modal=null;render();}
function bgC(e){if(e.target.className==='mbg')cm();}

function addP(){
  var name=V('mn');if(!name)return;
  api('POST','/api/projects',{name:name,short:name.split(' ')[0],location:V('ml')||'-',client:V('mc')||'-',phone:V('mph'),email:V('mem'),notes:V('mnt'),weeks:+V('mw')||16,progress:0}).then(function(r){
    if(r){toast('Projekt dodany');cm();loadData().then(function(){S.selP=r.id;S.view='gantt';render();});}
  });
}
function saveP(){
  var p=GP(S.selP);if(!p)return;
  var name=V('mn')||p.name;
  api('PUT','/api/projects/'+p.id,{name:name,short:name.split(' ')[0],location:V('ml'),client:V('mc'),phone:V('mph'),email:V('mem'),notes:V('mnt'),weeks:+V('mw')||p.weeks}).then(function(){
    toast('Zapisano');cm();loadData();
  });
}
function delProj(id){
  if(!confirm('Usunac projekt i wszystkie jego etapy?'))return;
  api('DELETE','/api/projects/'+id).then(function(){
    toast('Projekt usuniety');
    S.selP=S.projects.length>1?S.projects[0].id:null;
    loadData().then(function(){S.view='projects';render();});
  });
}
function addStg(){
  var p=GP(S.selP);if(!p)return;
  var name=V('sn');if(!name)return;
  var subId=V('su')?+V('su'):null;
  api('POST','/api/projects/'+p.id+'/stages',{name:name,subId:subId,start:+V('st2')||1,dur:+V('sd2')||2,status:V('ss2')||'planned',notes:V('snot')}).then(function(){
    toast('Etap dodany');cm();loadData();
  });
}
function saveStg(id){
  var p=GP(S.selP);if(!p)return;
  var s=null;(p.stages||[]).forEach(function(x){if(x.id===id)s=x;});if(!s)return;
  var name=V('en');if(!name)return;
  var subId=V('eu')?+V('eu'):null;
  api('PUT','/api/stages/'+id,{name:name,subId:subId,start:+V('et')||s.start,dur:+V('ed')||s.dur,status:V('es3')||s.status,notes:V('enot')}).then(function(){
    toast('Etap zaktualizowany');cm();loadData();
  });
}
function qSt(id,ns){
  var p=GP(S.selP);if(!p)return;
  var s=null;(p.stages||[]).forEach(function(x){if(x.id===id)s=x;});if(!s)return;
  api('PUT','/api/stages/'+id,{name:s.name,subId:s.subId,start:s.start,dur:s.dur,status:ns,notes:s.notes||''}).then(function(){
    toast('Status zmieniony');loadData();
  });
}
function delStg(id){
  if(!confirm('Usunac ten etap?'))return;
  api('DELETE','/api/stages/'+id).then(function(){toast('Etap usuniety');loadData();});
}
function addB(){
  var name=V('bname');if(!name)return;
  api('POST','/api/subcontractors',{name:name,contact:V('bcont'),phone:V('bph'),email:V('bmail'),specs:V('bspec').split(',').map(function(x){return x.trim();}).filter(Boolean),notes:V('bnot'),active:V('bact')!=='0'}).then(function(){
    toast('Podwykonawca dodany');cm();loadData();
  });
}
function saveB(id){
  api('PUT','/api/subcontractors/'+id,{name:V('bname'),contact:V('bcont'),phone:V('bph'),email:V('bmail'),specs:V('bspec').split(',').map(function(x){return x.trim();}).filter(Boolean),notes:V('bnot'),active:V('bact')!=='0'}).then(function(){
    toast('Zapisano');cm();loadData();
  });
}
function delSub(id){
  if(!confirm('Usunac podwykonawce?'))return;
  api('DELETE','/api/subcontractors/'+id).then(function(){toast('Usunieto');S.selS=null;loadData();});
}

function toCSV(rows){
  return '\uFEFF'+rows.map(function(r){
    if(!r.length)return '';
    return r.map(function(c){return '"'+String(c===null||c===undefined?'':c).replace(/"/g,'""')+'"';}).join(';');
  }).join('\r\n');
}
function dlFile(csv,fn){
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=fn;document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}
function exportXls(projId){
  var p=GP(projId);if(!p){toast('Nie znaleziono projektu');return;}
  var rows=[['Projekt:',p.name],['Lokalizacja:',p.location||''],['Klient:',p.client||''],['Telefon:',p.phone||''],['Email:',p.email||''],['Tygodnie:',p.weeks],[],['Etap','Podwykonawca','Tydzien start','Czas trwania (tyg.)','Tydzien konca','Status','Notatka']];
  (p.stages||[]).forEach(function(s){var sub=s.subId?GS(s.subId):null;rows.push([s.name,sub?sub.name:'-',s.start,s.dur,s.start+s.dur-1,SLX[s.status]||s.status,s.notes||'']);});
  var fn='harmonogram_'+p.name.replace(/[^a-zA-Z0-9]/g,'_')+'.csv';
  dlFile(toCSV(rows),fn);toast('Pobrano: '+fn);
}
function exportAll(){
  var rows=[['Projekt','Lokalizacja','Klient','Etap','Podwykonawca','Tydzien start','Czas trwania','Tydzien konca','Status','Notatka']];
  S.projects.forEach(function(p){
    if(!(p.stages||[]).length){rows.push([p.name,p.location||'',p.client||'','-','-','','','','','']);return;}
    p.stages.forEach(function(s){var sub=s.subId?GS(s.subId):null;rows.push([p.name,p.location||'',p.client||'',s.name,sub?sub.name:'-',s.start,s.dur,s.start+s.dur-1,SLX[s.status]||s.status,s.notes||'']);});
  });
  dlFile(toCSV(rows),'harmonogram_wszystkie_projekty.csv');toast('Pobrano plik');
}

api('GET','/api/me').then(function(me){
  if(me&&me.authenticated){S.auth=true;S.loading=true;render();loadData();}
  else{S.auth=false;S.loading=false;render();}
}).catch(function(){S.auth=false;S.loading=false;render();});
</script>
</body>
</html>
